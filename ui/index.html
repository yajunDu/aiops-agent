<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOps 控制台</title>
<style>
  :root{
    --bg:#0e1320; --panel:#151d2e; --panel-2:#1b2438; --line:#27324c;
    --text:#e7ecf6; --muted:#8b98b4; --faint:#5e6b88;
    --detect:#f5a623; --diagnose:#8b7cf6; --remediate:#2dd4bf; --verify:#34d399;
    --accent:#4d8dff; --danger:#f06a6a;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
       font-size:14px;line-height:1.5;
       background-image:radial-gradient(1200px 600px at 80% -10%,rgba(77,141,255,.08),transparent);}
  /* top bar */
  header{display:flex;align-items:center;justify-content:space-between;
         padding:14px 22px;border-bottom:1px solid var(--line);background:rgba(14,19,32,.7);
         position:sticky;top:0;backdrop-filter:blur(6px);z-index:5}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:26px;height:26px;border-radius:7px;
        background:conic-gradient(from 200deg,var(--detect),var(--diagnose),var(--remediate),var(--verify),var(--detect));
        box-shadow:0 0 0 1px var(--line),0 4px 16px rgba(77,141,255,.25)}
  .brand h1{font-size:15px;font-weight:650;margin:0;letter-spacing:.2px}
  .brand .sub{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .top-right{display:flex;align-items:center;gap:14px}
  .pill{font-family:var(--mono);font-size:11.5px;color:var(--muted);
        border:1px solid var(--line);border-radius:999px;padding:5px 12px;display:flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--verify);box-shadow:0 0 8px var(--verify)}
  button.run{font-family:var(--sans);font-weight:600;font-size:13px;color:#06122b;
        background:var(--accent);border:0;border-radius:8px;padding:9px 16px;cursor:pointer;
        transition:transform .1s,box-shadow .2s;box-shadow:0 2px 12px rgba(77,141,255,.35)}
  button.run:hover{transform:translateY(-1px)}
  button.run:disabled{opacity:.5;cursor:wait;transform:none}

  /* layout */
  .grid{display:grid;grid-template-columns:1fr 380px;gap:18px;padding:18px 22px;max-width:1400px;margin:0 auto}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card + .card{margin-top:16px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
           color:var(--faint);margin:0 0 14px}

  /* signature: pipeline */
  .pipe{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative}
  .stage{text-align:center;position:relative;padding-top:34px}
  .stage::before{content:"";position:absolute;top:13px;left:50%;right:-50%;height:2px;background:var(--line)}
  .stage:last-child::before{display:none}
  .node{position:absolute;top:4px;left:50%;transform:translateX(-50%);
        width:20px;height:20px;border-radius:50%;background:var(--panel-2);
        border:2px solid var(--line);transition:all .35s;z-index:2}
  .stage .name{font-weight:600;font-size:13px}
  .stage .zh{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .stage.active .node{transform:translateX(-50%) scale(1.15)}
  .stage.done .node{border-color:var(--c);background:var(--c);box-shadow:0 0 12px var(--c)}
  .stage.active .node{border-color:var(--c);box-shadow:0 0 0 6px color-mix(in srgb,var(--c) 22%,transparent)}
  .stage.active::before,.stage.done::before{background:linear-gradient(90deg,var(--c),var(--line))}
  .stage[data-s=detect]{--c:var(--detect)} .stage[data-s=diagnose]{--c:var(--diagnose)}
  .stage[data-s=remediate]{--c:var(--remediate)} .stage[data-s=verify]{--c:var(--verify)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .stage.active .name{animation:pulse 1.1s infinite}

  /* result */
  .kv{display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:4px}
  .kv .k{font-family:var(--mono);font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
  .kv .v{font-family:var(--mono);font-size:15px;font-weight:600}
  .svc{font-family:var(--mono);color:var(--accent)}
  .tag{font-family:var(--mono);font-size:11px;padding:2px 9px;border-radius:6px;border:1px solid var(--line)}
  .tag.cpu{color:var(--detect);border-color:color-mix(in srgb,var(--detect) 40%,var(--line))}
  .tag.network{color:#7cc4ff;border-color:#2b5680}
  .tag.pod_kill{color:var(--danger);border-color:#6e3636}
  .path{font-family:var(--mono);font-size:13px;margin-top:12px;color:var(--muted);
        background:var(--panel-2);border-radius:8px;padding:10px 12px;border:1px solid var(--line)}
  .path b{color:var(--verify)} .arrow{color:var(--faint);margin:0 6px}
  .heal{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:10px}
  .conf-bar{height:6px;border-radius:3px;background:var(--panel-2);overflow:hidden;flex:1;min-width:120px}
  .conf-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--diagnose),var(--verify))}

  /* event log */
  .log{font-family:var(--mono);font-size:12px;max-height:170px;overflow:auto;margin-top:4px}
  .log .line{padding:4px 0;border-bottom:1px solid rgba(39,50,76,.5);display:flex;gap:9px;opacity:0;animation:in .3s forwards}
  @keyframes in{to{opacity:1}}
  .log .st{color:var(--c,var(--muted));min-width:74px}
  .log .line[data-s=detect]{--c:var(--detect)} .log .line[data-s=diagnose]{--c:var(--diagnose)}
  .log .line[data-s=remediate]{--c:var(--remediate)} .log .line[data-s=verify]{--c:var(--verify)}

  .empty{color:var(--faint);text-align:center;padding:28px 0;font-size:13px}

  /* chat */
  .chat{display:flex;flex-direction:column;height:calc(100vh - 116px);min-height:460px}
  .msgs{flex:1;overflow:auto;display:flex;flex-direction:column;gap:12px;padding-right:4px}
  .msg{max-width:90%;padding:10px 13px;border-radius:12px;font-size:13.5px;white-space:pre-wrap;word-break:break-word}
  .msg.user{align-self:flex-end;background:var(--accent);color:#06122b;border-bottom-right-radius:4px}
  .msg.bot{align-self:flex-start;background:var(--panel-2);border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg.bot.think{color:var(--muted);font-family:var(--mono);font-size:12px}
  .composer{display:flex;gap:8px;margin-top:12px}
  .composer input{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
        padding:11px 13px;color:var(--text);font-family:var(--sans);font-size:13.5px;outline:none}
  .composer input:focus{border-color:var(--accent)}
  .composer button{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
        color:var(--text);padding:0 15px;cursor:pointer;font-weight:600}
  .composer button:hover{border-color:var(--accent)}
  .hint{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .hint span{font-size:11.5px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:4px 10px;cursor:pointer}
  .hint span:hover{border-color:var(--accent);color:var(--text)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo"></div>
    <div><h1>AIOps 控制台</h1><div class="sub">self-healing ops agent · train-ticket</div></div>
  </div>
  <div class="top-right">
    <div class="pill"><span class="dot"></span><span id="clusterState">集群在线</span></div>
    <button class="run" id="runBtn" onclick="runLoop()">▶ 运行一次闭环</button>
  </div>
</header>

<div class="grid">
  <!-- 大盘 -->
  <section>
    <div class="card">
      <p class="eyebrow">闭环流水线</p>
      <div class="pipe" id="pipe">
        <div class="stage" data-s="detect"><div class="node"></div><div class="name">Detect</div><div class="zh">感知</div></div>
        <div class="stage" data-s="diagnose"><div class="node"></div><div class="name">Diagnose</div><div class="zh">根因定位</div></div>
        <div class="stage" data-s="remediate"><div class="node"></div><div class="name">Remediate</div><div class="zh">自愈</div></div>
        <div class="stage" data-s="verify"><div class="node"></div><div class="name">Verify</div><div class="zh">恢复确认</div></div>
      </div>
    </div>

    <div class="card" id="resultCard">
      <p class="eyebrow">根因定位结果</p>
      <div id="resultBody"><div class="empty">点击右上角「运行一次闭环」，开始一次检测 → 定位 → 自愈。</div></div>
    </div>

    <div class="card">
      <p class="eyebrow">实时事件</p>
      <div class="log" id="log"><div class="empty">等待运行…</div></div>
    </div>
  </section>

  <!-- AI 问答 -->
  <aside class="card chat">
    <p class="eyebrow">AI 问答</p>
    <div class="msgs" id="msgs">
      <div class="msg bot">你好，我是运维助手。可以问我集群拓扑、服务指标或刚才的根因诊断。</div>
    </div>
    <div class="hint" id="hints">
      <span onclick="quick(this)">ts-gateway-service 现在 CPU 怎么样？</span>
      <span onclick="quick(this)">画出网关的下游调用链</span>
      <span onclick="quick(this)">刚才那次故障的根因是什么？</span>
    </div>
    <div class="composer">
      <input id="chatInput" placeholder="问点什么…" onkeydown="if(event.key==='Enter')sendChat()">
      <button onclick="sendChat()">发送</button>
    </div>
  </aside>
</div>

<script>
const API = "";  // 同源
const FAULT_PARQUET = "experiments/metrics/20260519-171537-cpu-admin-order.parquet";

function setStage(s, state){ // state: active | done | ''
  document.querySelectorAll('.stage').forEach(el=>{
    if(el.dataset.s===s){ el.classList.remove('active','done'); if(state) el.classList.add(state); }
  });
}
function resetPipe(){ document.querySelectorAll('.stage').forEach(el=>el.classList.remove('active','done')); }

function logLine(stage,msg){
  const log=document.getElementById('log');
  if(log.querySelector('.empty')) log.innerHTML='';
  const d=document.createElement('div'); d.className='line'; d.dataset.s=stage;
  d.innerHTML=`<span class="st">${stage}</span><span>${msg}</span>`;
  log.appendChild(d); log.scrollTop=log.scrollHeight;
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function runLoop(){
  const btn=document.getElementById('runBtn'); btn.disabled=true; btn.textContent='运行中…';
  resetPipe(); document.getElementById('log').innerHTML='';
  document.getElementById('resultBody').innerHTML='<div class="empty">分析中…</div>';
  try{
    const r=await fetch(API+"/api/run-loop",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({parquet:FAULT_PARQUET})});
    if(!r.ok) throw new Error("backend "+r.status);
    const data=await r.json();
    // 按事件分阶段点亮 + 滚日志
    const order=["detect","diagnose","remediate","verify"];
    let seen=new Set();
    for(const ev of (data.events||[])){
      setStage(ev.stage,'active'); logLine(ev.stage,ev.msg);
      // 上一阶段标记完成
      const idx=order.indexOf(ev.stage);
      order.slice(0,idx).forEach(s=>setStage(s,'done'));
      seen.add(ev.stage);
      await sleep(550);
    }
    order.filter(s=>seen.has(s)).forEach(s=>setStage(s,'done'));
    renderResult((data.results||[])[0]);
  }catch(e){
    document.getElementById('clusterState').textContent='后端未连接';
    document.querySelector('.dot').style.background='var(--danger)';
    document.querySelector('.dot').style.boxShadow='0 0 8px var(--danger)';
    document.getElementById('resultBody').innerHTML=
      `<div class="empty">无法连接后端（${e.message}）。请先启动：<br><code style="color:var(--accent)">python ui_backend/server.py</code></div>`;
  }finally{ btn.disabled=false; btn.textContent='▶ 运行一次闭环'; }
}

function renderResult(res){
  const body=document.getElementById('resultBody');
  if(!res){ body.innerHTML='<div class="empty">本轮未检出异常。</div>'; return; }
  const d=res.diagnosis||{}; const ft=(d.fault_type||'UNKNOWN').toLowerCase();
  const conf=Math.round((d.confidence||0)*100);
  let pathHtml='';
  const pp=d.propagation_path;
  if(pp&&pp.hops&&pp.hops.length){
    pathHtml='<div class="path">传播链　'+pp.hops.map((h,i)=>
      (i?'<span class="arrow">→</span>':'')+(i===0?'<b>'+h+'</b>':h)).join('')+'</div>';
  }
  const rem=res.remediation;
  let healHtml='';
  if(rem){
    healHtml=`<div class="heal">
      <span class="k">自愈</span>
      <span class="v" style="font-size:13px">${rem.display_name||rem.template||'-'}</span>
      <span class="tag">${rem.risk_level||''} 风险</span>
      <span class="tag" style="color:${rem.status==='ready'?'var(--verify)':'var(--detect)'}">${rem.status}</span>
    </div>`;
  }
  const rec = res.recovered===true?'已恢复':(res.recovered===false?'未恢复':'dry-run');
  body.innerHTML=`
    <div class="kv">
      <div><div class="k">根因服务</div><div class="v svc">${d.root_cause_service||'-'}</div></div>
      <div><div class="k">故障类型</div><div class="v"><span class="tag ${ft}">${d.fault_type||'-'}</span></div></div>
      <div><div class="k">恢复</div><div class="v">${rec}${res.mttr_sec!=null?' · '+res.mttr_sec+'s':''}</div></div>
    </div>
    <div style="margin-top:14px"><div class="k" style="font-family:var(--mono);font-size:11px;color:var(--faint)">置信度 ${conf}%</div>
      <div class="conf-bar"><i style="width:${conf}%"></i></div></div>
    ${pathHtml}${healHtml}
    <div style="margin-top:12px;color:var(--muted);font-size:13px">${d.summary||''}</div>`;
}

/* ---- chat ---- */
function quick(el){ document.getElementById('chatInput').value=el.textContent; sendChat(); }
async function sendChat(){
  const inp=document.getElementById('chatInput'); const text=inp.value.trim(); if(!text) return;
  inp.value=''; addMsg('user',text);
  const think=addMsg('bot think','正在查询集群…');
  try{
    const r=await fetch(API+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})});
    const data=await r.json();
    think.remove(); addMsg('bot',data.reply||'（无回复）');
  }catch(e){ think.remove(); addMsg('bot','后端未连接，无法回答。请先启动 ui_backend/server.py。'); }
}
function addMsg(cls,text){
  const m=document.createElement('div'); m.className='msg '+cls; m.textContent=text;
  const box=document.getElementById('msgs'); box.appendChild(m); box.scrollTop=box.scrollHeight; return m;
}
</script>
</body>
</html>
